<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Death Note Type</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: #000;
}
#container {
  width: 1080px;
  height: 1920px;
  position: relative;
  background: #000;
}
ruffle-player {
  width: 1080px !important;
  height: 1080px !important;  /* Keep game aspect, top portion */
  display: block;
}
#bottom-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 1080px;
  height: 840px;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #cc0000;
  font-family: 'Courier New', monospace;
}
#now-writing {
  font-size: 36px;
  font-weight: bold;
  color: #ff0000;
  text-shadow: 0 0 20px #ff0000;
  margin-bottom: 20px;
  letter-spacing: 4px;
}
#current-name {
  font-size: 64px;
  font-weight: bold;
  color: #ffffff;
  text-shadow: 0 0 30px #cc0000;
  min-height: 80px;
  letter-spacing: 6px;
}
#name-queue {
  font-size: 24px;
  color: #666;
  margin-top: 30px;
  max-width: 900px;
  text-align: center;
  line-height: 1.6;
}
#status-bar {
  position: absolute;
  top: 10px;
  right: 10px;
  color: #333;
  font-size: 16px;
  font-family: monospace;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@latest/ruffle.min.js"></script>
</head>
<body>
<div id="container">
  <div id="status-bar" id="status-bar">⚫ Loading...</div>
  <div id="bottom-panel">
    <div id="now-writing">✍ WRITING IN DEATH NOTE</div>
    <div id="current-name" id="current-name">_</div>
    <div id="name-queue" id="name-queue">Waiting for names...</div>
  </div>
</div>

<script>
window.GAME_READY = false;
window.CURRENT_NAME = '';
window.NAME_QUEUE = [];

function updateDisplay(name) {
  document.getElementById('current-name').textContent = name || '_';
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

async function start() {
  try {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    player.style.width = "1080px";
    player.style.height = "1080px";
    player.style.display = "block";

    // Insert player BEFORE the bottom panel
    const container = document.getElementById('container');
    container.insertBefore(player, container.firstChild);

    await player.load("https://files.crazygames.com/death-note-type/1/death%20note%20type.swf");

    player.addEventListener('loadeddata', () => {
      setStatus('🔴 LIVE');
      window.GAME_READY = true;
    });

    // Fallback: mark ready after 8 seconds even if event doesn't fire
    setTimeout(() => {
      window.GAME_READY = true;
      setStatus('🔴 LIVE');
    }, 8000);

  } catch(e) {
    setStatus('❌ Error: ' + e.message);
    // Still mark ready so script doesn't hang
    setTimeout(() => { window.GAME_READY = true; }, 2000);
  }
}

if (window.RufflePlayer) {
  start();
} else {
  window.addEventListener('load', function() {
    setTimeout(start, 500);
  });
}

// Expose helper for Playwright to update display overlay
window.setCurrentName = function(name) {
  window.CURRENT_NAME = name;
  updateDisplay(name);
};
window.setQueue = function(names) {
  window.NAME_QUEUE = names;
  if (names.length > 0) {
    document.getElementById('name-queue').textContent = 
      'Up next: ' + names.slice(0, 5).join(' → ');
  }
};
</script>
</body>
</html>
