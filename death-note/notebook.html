<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Death Note</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;background:#0a0805;font-family:'Caveat',cursive}

#notebook{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) perspective(1200px) rotateX(2deg);
  width:900px;height:1400px;
  background:linear-gradient(135deg,#d4c5a0 0%,#ddd0b0 30%,#d0c098 70%,#c8b888 100%);
  border-radius:4px;
  box-shadow:0 0 80px rgba(0,0,0,0.9),inset 0 0 30px rgba(0,0,0,0.08);
  padding:60px 60px 40px 80px;
  overflow:hidden;
}

/* Ruled lines */
#notebook::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(transparent,transparent 46px,rgba(100,130,170,0.18) 46px,rgba(100,130,170,0.18) 47px);
  pointer-events:none;
}

/* Red margin */
#notebook::after{
  content:'';position:absolute;top:0;bottom:0;left:72px;width:2px;
  background:rgba(200,60,60,0.25);pointer-events:none;
}

/* Spine shadow */
#spine{
  position:absolute;top:0;bottom:0;left:50%;width:40px;transform:translateX(-50%);
  background:linear-gradient(90deg,transparent,rgba(0,0,0,0.06) 40%,rgba(0,0,0,0.12) 50%,rgba(0,0,0,0.06) 60%,transparent);
  pointer-events:none;z-index:5;
}

/* Paper texture */
#texture{
  position:absolute;top:0;left:0;right:0;bottom:0;
  opacity:0.03;pointer-events:none;z-index:1;
  background:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.7' numOctaves='4'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)'/%3E%3C/svg%3E");
}

#names{position:relative;z-index:2;height:100%;overflow:hidden}

.name-line{
  font-size:34px;font-weight:700;color:#1a0a30;
  line-height:47px;height:47px;
  text-shadow:1px 1px 3px rgba(0,0,0,0.12);
  white-space:nowrap;overflow:hidden;
}
.name-line.superchat{color:#8b1a1a;font-size:40px;text-shadow:0 0 10px rgba(200,50,50,0.25)}
.name-line .char{display:inline-block}

/* Cursor */
.cursor{display:inline-block;width:2px;height:30px;background:#1a0a30;animation:blink .7s step-end infinite;vertical-align:middle}
.name-line.done .cursor{display:none}
@keyframes blink{50%{opacity:0}}

/* Red flash */
@keyframes flash{0%{box-shadow:inset 0 0 0 0 transparent}30%{box-shadow:inset 0 0 60px rgba(200,30,30,0.15)}100%{box-shadow:inset 0 0 0 0 transparent}}
#notebook.flash{animation:flash .5s ease-out}

/* Vignette */
#vignette{position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.75) 100%);
  pointer-events:none;z-index:10}

/* Candle glow */
#glow{position:fixed;bottom:-100px;left:-100px;width:600px;height:600px;
  background:radial-gradient(circle,rgba(255,180,80,0.08) 0%,transparent 70%);
  pointer-events:none;z-index:9}

/* Particles */
canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:11}

/* Bottom CTA */
#cta{position:fixed;bottom:30px;left:0;right:0;text-align:center;
  font-family:sans-serif;font-size:22px;color:rgba(200,170,140,0.6);
  z-index:20;text-shadow:0 0 10px rgba(0,0,0,0.8)}
</style>
</head>
<body>
<div id="notebook">
  <div id="spine"></div>
  <div id="texture"></div>
  <div id="names"></div>
</div>
<div id="vignette"></div>
<div id="glow"></div>
<canvas id="particles"></canvas>
<div id="cta">⚡ SUBSCRIBE — Kira will write YOUR name</div>

<script>
const MAX_LINES = 28;
const container = document.getElementById('names');
const notebook = document.getElementById('notebook');
const canvas = document.getElementById('particles');
const pctx = canvas.getContext('2d');
canvas.width = 1080; canvas.height = 1920;

// Particles
const parts = [];
for(let i=0;i<40;i++) parts.push({x:Math.random()*1080,y:Math.random()*1920,vy:-Math.random()*0.5-0.1,vx:(Math.random()-0.5)*0.2,s:Math.random()*2+0.5,a:Math.random()*0.4+0.1,l:Math.random()*300});
function drawParticles(){
  pctx.clearRect(0,0,1080,1920);
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.l++;p.a=Math.sin(p.l*0.015)*0.3+0.15;
    if(p.y<-10||p.l>400){p.y=1930;p.x=Math.random()*1080;p.l=0}
    pctx.fillStyle=`rgba(255,${130+Math.random()*40},${30+Math.random()*20},${Math.max(0,p.a)})`;
    pctx.beginPath();pctx.arc(p.x,p.y,p.s,0,Math.PI*2);pctx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// CTA rotation
const ctas = [
  "⚡ SUBSCRIBE — Kira will write YOUR name",
  "💀 SUPERCHAT to enter the Shinigami Rankings",
  "👁️ Kira is watching... Will YOU be next?",
  "✍️ Every name brings justice closer"
];
let ctaIdx = 0;
setInterval(()=>{ctaIdx++;document.getElementById('cta').textContent=ctas[ctaIdx%ctas.length]},8000);

// Name writing
let typing = false;
let nameQueue = [];
let lineCount = 0;

function createLine(isSuper){
  const div = document.createElement('div');
  div.className = 'name-line' + (isSuper ? ' superchat' : '');
  div.innerHTML = '<span class="text"></span><span class="cursor"></span>';
  container.appendChild(div);
  lineCount++;
  while(container.children.length > MAX_LINES) container.removeChild(container.firstChild);
  return div;
}

async function writeName(name, type){
  if(typing){nameQueue.push({name,type});return}
  typing = true;
  const isSuper = type === 'superchat';
  const line = createLine(isSuper);
  const textSpan = line.querySelector('.text');

  for(let i=0;i<name.length;i++){
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = name[i];
    span.style.transform = `translateY(${(Math.random()-0.5)*3}px) rotate(${(Math.random()-0.5)*1.5}deg)`;
    textSpan.appendChild(span);
    await new Promise(r=>setTimeout(r, 60 + Math.random()*100));
  }

  await new Promise(r=>setTimeout(r,300));
  line.classList.add('done');
  notebook.classList.remove('flash');
  void notebook.offsetWidth;
  notebook.classList.add('flash');

  typing = false;
  if(nameQueue.length){
    const next = nameQueue.shift();
    setTimeout(()=>writeName(next.name,next.type), 800+Math.random()*1500);
  }
}

// API
window.streamAPI = {
  writeName: function(n,t){writeName(n,t||'sub')},
  stopDemo: function(){demoOn=false},
  startDemo: function(){demoOn=true;demo()}
};
window.addName = function(n,t){writeName(n,t||'sub')};

// Demo
const demoNames = ["DarkKnight_99","MisaMisa_fan","L_detective","anime_lover","kira_justice",
"ryuk_apples","death_god_42","shinigami_eyes","light_yagami_x","near_wins",
"mello_choco","matsuda_lol","NightGod99","DeathNoteOtaku","ShinigamiKing",
"ANGRYGRANNY","FRED","SilentKiller","JusticeServd","KiraDevotee"];
let di=0, demoOn=true;
function demo(){
  if(!demoOn)return;
  const name=demoNames[di%demoNames.length];
  const isSuper=Math.random()<0.12;
  writeName(name, isSuper?'superchat':'sub');
  di++;
  setTimeout(demo, 4000+Math.random()*4000);
}
setTimeout(demo, 2000);
</script>
</body>
</html>
