name: Re-trigger
on:
  workflow_run:
    workflows: ["YT Viewer"]
    types: [completed]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger next run
        run: |
          sleep 60
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/viewer.yml/dispatches" \
            -d '{"ref":"main"}'
